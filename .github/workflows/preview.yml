# Deploys a temporary preview Worker for each pull request.
#
# Each PR gets its own uniquely-named Worker (<base>-pr-<number>) so previews
# never collide with each other or with the production deploy on main. The
# matching preview-cleanup.yml workflow deletes these Workers when the PR closes.
#
# Requires the same repository secrets as deploy-examples.yml:
#   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
#
# Internal branches only: forked PRs do not receive repository secrets, so the
# job is guarded to same-repo pull requests.
name: PR preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "packages/**"
      - "examples/**"
      - ".github/workflows/preview.yml"

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: example-todo-forkable
            dir: examples/todo
            config: dist/todo_forkable/wrangler.json
            base: todo-forkable
          - workspace: example-react-notes-forkable
            dir: examples/react-notes
            config: dist/react_notes_forkable/wrangler.json
            base: react-notes-forkable
    name: preview ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build -w vite-plugin-forkable-worker
      - run: npm run build -w ${{ matrix.workspace }}
      - name: Deploy preview Worker
        id: deploy
        working-directory: ${{ matrix.dir }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WORKER_NAME: ${{ matrix.base }}-pr-${{ github.event.pull_request.number }}
        run: |
          set -o pipefail
          npx wrangler deploy -c "${{ matrix.config }}" --name "$WORKER_NAME" 2>&1 | tee deploy.log
          url=$(grep -Eo 'https://[a-z0-9.-]+\.workers\.dev' deploy.log | head -n1)
          echo "url=$url" >> "$GITHUB_OUTPUT"
      - name: Upsert preview comment
        uses: actions/github-script@v9
        env:
          BASE: ${{ matrix.base }}
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
        with:
          script: |
            const base = process.env.BASE;
            const url = process.env.PREVIEW_URL;
            const marker = `<!-- preview-${base} -->`;
            const line = url
              ? `**${base}** preview: ${url}`
              : `**${base}** deployed, but no workers.dev URL was found in the deploy output.`;
            const body = `${marker}\n${line}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
