# Tears down the per-PR preview Workers created by preview.yml.
#
# Runs when a pull request is closed (merged or not) and deletes each
# <base>-pr-<number> Worker. Deleting the Worker also removes its Durable
# Object storage. Deletion is tolerant of a Worker that was never created
# (for example, a PR that only touched docs).
#
# Uses pull_request_target (not pull_request) so teardown runs from the base
# branch context and does not depend on the PR head ref still existing. This
# is what makes cleanup survive the branch being deleted at close/merge time.
# It does not check out or run PR head code (checkout defaults to the base
# ref), so the usual pull_request_target code-execution risk does not apply.
name: PR preview cleanup

on:
  pull_request_target:
    types: [closed]

concurrency:
  group: preview-cleanup-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

jobs:
  cleanup:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        base:
          - todo-forkable
          - react-notes-forkable
    name: cleanup ${{ matrix.base }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Delete preview Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WORKER_NAME: ${{ matrix.base }}-pr-${{ github.event.pull_request.number }}
        run: npx wrangler delete "$WORKER_NAME" --force || echo "No preview Worker '$WORKER_NAME' to delete."
      - name: Delete preview Artifacts repos
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ARTIFACTS_NAMESPACE: ${{ matrix.base }}-pr-${{ github.event.pull_request.number }}
        run: |
          repos_json=$(npx wrangler artifacts repos list --namespace "$ARTIFACTS_NAMESPACE" --json 2>/dev/null || true)
          repo_names=$(REPOS_JSON="$repos_json" node --input-type=module <<'NODE'
          const raw = process.env.REPOS_JSON || "[]";
          let parsed;
          try {
            parsed = JSON.parse(raw);
          } catch {
            parsed = [];
          }
          const repos = Array.isArray(parsed)
            ? parsed
            : (parsed.repos ?? parsed.repositories ?? parsed.result ?? []);
          for (const repo of repos) {
            if (repo?.name) console.log(repo.name);
          }
          NODE
          )
          if [ -z "$repo_names" ]; then
            echo "No preview Artifacts repos found in '$ARTIFACTS_NAMESPACE'."
            exit 0
          fi
          while IFS= read -r repo; do
            npx wrangler artifacts repos delete "$repo" --namespace "$ARTIFACTS_NAMESPACE" --force || echo "Could not delete Artifacts repo '$repo'."
          done <<< "$repo_names"
